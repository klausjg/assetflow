<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Asset Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png?v=1">
  <link rel="icon" type="image/png" sizes="32x32" href="./icon.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="./icon.png?v=1">
  <link rel="shortcut icon" href="./icon.png?v=1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Asset Flow">
  <meta name="theme-color" content="#0F1218">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Pinyon+Script&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ─────────────────────────────────────────
       Asset Flow 웹앱과 동일한 테마 토큰
       ───────────────────────────────────────── */
    :root{
      --bg:#0F1218; --surface:#131820; --card:#171E27; --card2:#1C2535;
      --border:#1E2A38; --border-light:#2A3D52;
      --accent:#C9A96E; --accent2:#E8D5A3; --accent-dim:rgba(201,169,110,0.12);
      --muted:#4A5568; --sub:#7A8494; --text:#F5EDD8; --text-dim:#BFB99E;
      --mono:'IBM Plex Mono',monospace;
      --sans:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;
      --script:'Pinyon Script',cursive;
    }
    [data-theme="sapphire"]{--bg:#0A1628;--surface:#0D1E36;--card:#101F38;--card2:#152540;--border:#1A2E4A;--border-light:#2A4A6A;--accent:#5B9BD5;--accent2:#A8C8E8;--accent-dim:rgba(91,155,213,0.12);--muted:#2A4A6A;--sub:#4A6A8A;--text:#E8F4FF;--text-dim:#8AAFD0;}
    [data-theme="forest"]{--bg:#0C120C;--surface:#0A0F0A;--card:#0E150E;--card2:#121A12;--border:#1A2A1A;--border-light:#2A4A2A;--accent:#4CAF7A;--accent2:#A8DCBE;--accent-dim:rgba(76,175,122,0.12);--muted:#1E3A1E;--sub:#2A5A2A;--text:#D4EDDA;--text-dim:#7ABE9E;}
    [data-theme="rose"]{--bg:#1A1A1E;--surface:#141416;--card:#18181C;--card2:#1E1E24;--border:#242428;--border-light:#32323A;--accent:#C47882;--accent2:#E8B8C0;--accent-dim:rgba(196,120,130,0.12);--muted:#3A3A42;--sub:#5A5A6A;--text:#F0EEF5;--text-dim:#9A98A8;}
    [data-theme="hanji"]{--bg:#0E0C0A;--surface:#12100E;--card:#171410;--card2:#1E1A14;--border:#2A2018;--border-light:#3A3020;--accent:#D4A96A;--accent2:#EDD09A;--accent-dim:rgba(212,169,106,0.13);--muted:#4A3A2A;--sub:#8A7A6A;--text:#EDE0CC;--text-dim:#C4B49A;}
    [data-theme="hangang"]{--bg:#060E18;--surface:#08121E;--card:#0C1826;--card2:#101E2E;--border:#142030;--border-light:#1E3048;--accent:#00C8FF;--accent2:#8AE2FF;--accent-dim:rgba(0,200,255,0.12);--muted:#1A4060;--sub:#2A6080;--text:#D0EEFF;--text-dim:#7AACCC;}
    [data-theme="bukchon"]{--bg:#060E0A;--surface:#08120C;--card:#0C1810;--card2:#101E14;--border:#142A18;--border-light:#1E3C22;--accent:#00E8A0;--accent2:#8AF5D0;--accent-dim:rgba(0,232,160,0.12);--muted:#1A4030;--sub:#2A6050;--text:#D8FFF0;--text-dim:#7ABCAA;}
    [data-theme="hongdae"]{--bg:#0E0806;--surface:#130B08;--card:#18100C;--card2:#1E1610;--border:#2A1A12;--border-light:#3A2418;--accent:#FF7A5A;--accent2:#FFB8A2;--accent-dim:rgba(255,122,90,0.13);--muted:#4A2A20;--sub:#7A5040;--text:#FFE8E0;--text-dim:#C4907A;}

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body, html {
      background: var(--bg);
      width:100%; height:100%;
      overflow:hidden;
      font-family: var(--sans);
      color: var(--text);
      transition: background .3s ease, color .3s ease;
    }

    /* 은은한 accent glow 배경 — 웹앱 총자산 카드와 동일 */
    body::before {
      content:'';
      position:fixed; inset:0;
      background: radial-gradient(ellipse at center,
                                   var(--accent-dim) 0%,
                                   rgba(201,169,110,0.02) 40%,
                                   transparent 70%);
      pointer-events:none; z-index:0;
      transition: background .3s ease;
    }

    .full-screen {
      position:absolute; top:0; left:0;
      width:100%; height:100%;
      display:none;
      flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center;
      padding:30px; z-index:1;
    }

    .icon-preview {
      width:110px; height:110px;
      border-radius:24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8),
                  0 0 40px var(--accent-dim);
      margin-bottom:25px;
      border: 1px solid rgba(201,169,110,0.18);
      object-fit:cover;
      aspect-ratio:1/1;
      flex-shrink:0;
    }

    /* ─────────────────────────────────────────
       Pinyon Script 브랜드 타이틀 — 웹앱 topbar와 동일 톤
       ───────────────────────────────────────── */
    @keyframes brandShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .brand-title {
      font-family: var(--script);
      font-size: 44px;
      line-height: 1.1;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent), var(--accent2));
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: brandShimmer 4s linear infinite;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 600;
      margin-bottom: 26px;
      font-family: var(--sans);
      text-transform: uppercase;
    }

    .description {
      color: var(--sub);
      margin-bottom: 32px;
      line-height: 1.75;
      font-size: 14px;
      font-weight: 400;
      max-width: 320px;
    }

    .guide-button {
      background: linear-gradient(135deg, var(--accent) 0%, #7A5A20 100%);
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(201,169,110,0.28),
                  0 2px 8px rgba(0,0,0,0.4),
                  inset 0 1px 0 rgba(255,255,255,0.15);
      letter-spacing: 0.3px;
      font-family: var(--sans);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .guide-button:active {
      transform: translateY(1px);
      box-shadow: 0 5px 14px rgba(201,169,110,0.25),
                  inset 0 1px 0 rgba(255,255,255,0.15);
    }

    /* ─────────────────────────────────────────
       설치 가이드 오버레이 — Liquid Glass 느낌
       ───────────────────────────────────────── */
    #guide-overlay {
      display:none;
      position:fixed; inset:0;
      background: rgba(10,15,24,0.88);
      z-index:9999;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }
    .instruction {
      position:absolute; bottom:100px;
      width:100%; text-align:center; padding:20px;
    }
    .instruction h3 {
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 14px;
      font-family: var(--sans);
    }
    .instruction p {
      color: var(--text);
      font-size: 14px;
      line-height: 1.9;
      font-weight: 400;
    }
    .instruction strong {
      color: var(--accent2);
      font-weight: 600;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50%      { transform: translateY(14px); opacity: 1; }
    }
    .arrow {
      font-size: 44px;
      color: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
      margin-top: 22px;
    }

    /* ─────────────────────────────────────────
       로딩 브랜드 마크 — 웹앱 globalLoader와 동일 구조
       ───────────────────────────────────────── */
    .loading-brand {
      position:relative;
      width:80px; height:80px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom: 24px;
    }
    .lb-ring {
      position:absolute; inset:0;
      border-radius:50%;
      border: 1.5px solid var(--accent);
    }
    @keyframes lbRingPulse  { 0%,100%{transform:scale(1);opacity:.25} 50%{transform:scale(1.18);opacity:.55} }
    @keyframes lbRingPulse2 { 0%,100%{transform:scale(1);opacity:.15} 50%{transform:scale(1.32);opacity:.35} }
    .lb-ring.r1 { animation: lbRingPulse 2.2s ease-in-out infinite; }
    .lb-ring.r2 {
      inset:-14px;
      border-color: var(--accent-dim);
      animation: lbRingPulse2 2.2s ease-in-out .4s infinite;
    }
    @keyframes lbShimmer {
      0%   { background-position:-200% 0; }
      100% { background-position: 200% 0; }
    }
    .lb-mark {
      width:56px; height:56px;
      border-radius:16px;
      background: linear-gradient(135deg, var(--accent) 0%, #7A5A20 100%);
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
      box-shadow: 0 8px 32px rgba(201,169,110,.25), 0 2px 8px rgba(0,0,0,.4);
    }
    .lb-mark::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,.2) 40%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.2) 60%,
        transparent 100%);
      background-size:200% 100%;
      animation: lbShimmer 2.4s ease-in-out infinite;
    }
    .lb-af {
      font-size:22px; font-weight:700;
      color:#fff;
      font-family: var(--mono);
      letter-spacing:-.5px;
      position:relative; z-index:1;
    }

    .loading-title {
      font-family: var(--script);
      font-size: 28px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .loading-label {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 4px;
      font-family: var(--mono);
      font-weight: 500;
      margin-top: 6px;
    }

    /* 도트 인디케이터 */
    @keyframes dotBounce {
      0%,80%,100% { transform: translateY(0);   opacity:.35; }
      40%         { transform: translateY(-7px); opacity:1;   }
    }
    .loading-dots {
      display:flex; gap:6px;
      justify-content:center;
      margin-top: 18px;
    }
    .loading-dots span {
      width:5px; height:5px;
      border-radius:50%;
      background: var(--accent);
      opacity: .35;
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .18s; }
    .loading-dots span:nth-child(3) { animation-delay: .36s; }

    .fallback-msg {
      color: var(--muted);
      font-size: 11px;
      margin-top: 32px;
      text-decoration: underline;
      cursor: pointer;
      letter-spacing: 0.3px;
      font-family: var(--sans);
      transition: color .15s;
    }
    .fallback-msg:hover { color: var(--sub); }
  </style>

  <script>
    /* 웹앱 배포 URL — 사용자 본인 URL로 교체 */
    const APP_URL = "https://script.google.com/macros/s/AKfycbzOrPRi9lrwDJlFNIl-2rzlAgugfiwUZJ6Lz_Rnl1nAqtM_tXLHok-AsNVJBNp0pmwA/exec";

    /* 웹앱에서 저장한 테마를 읽어와 즉시 적용 */
    (function applyStoredTheme(){
      try {
        const t = localStorage.getItem('af-theme') || 'obsidian';
        if (t !== 'obsidian') document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();

    function init() {
      const isStandalone = window.navigator.standalone === true ||
                           window.matchMedia('(display-mode: standalone)').matches;

      document.getElementById('install-ui').style.display = 'none';
      document.getElementById('loading-ui').style.display = 'none';

      if (isStandalone) {
        document.getElementById('loading-ui').style.display = 'flex';
        setTimeout(() => { window.location.href = APP_URL; }, 300);
      } else {
        document.getElementById('install-ui').style.display = 'flex';
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</head>
<body>

  <!-- 설치 안내 화면 -->
  <div id="install-ui" class="full-screen">
    <img src="./icon.png?v=1" class="icon-preview" alt="Asset Flow">
    <div class="brand-title">Asset Flow</div>
    <div class="brand-sub">PORTFOLIO</div>
    <p class="description">
      나의 자산을 한눈에, 우아하게.<br>
      아래 버튼을 눌러 홈 화면에 설치하세요.
    </p>
    <button class="guide-button"
            onclick="document.getElementById('guide-overlay').style.display='block'">
      앱 설치 가이드
    </button>
  </div>

  <!-- 로딩 화면 — 웹앱 globalLoader와 동일 톤 -->
  <div id="loading-ui" class="full-screen">
    <div class="loading-brand">
      <div class="lb-ring r1"></div>
      <div class="lb-ring r2"></div>
      <div class="lb-mark">
        <span class="lb-af">AF</span>
      </div>
    </div>
    <div class="loading-title">Asset Flow</div>
    <div class="loading-label">LOADING PORTFOLIO</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="fallback-msg" onclick="window.location.href=APP_URL">
      페이지가 멈췄다면 여기를 터치하세요
    </div>
  </div>

  <!-- 설치 가이드 오버레이 -->
  <div id="guide-overlay" onclick="this.style.display='none'">
    <div class="instruction">
      <h3>홈 화면에 추가</h3>
      <p>
        1. 하단의 <strong>공유</strong> 버튼을 탭하세요.<br>
        2. 목록에서 <strong>'홈 화면에 추가'</strong>를 선택하세요.
      </p>
      <div class="arrow">↓</div>
    </div>
  </div>

</body>
</html>
